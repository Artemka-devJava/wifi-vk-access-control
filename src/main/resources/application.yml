server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: wifi-vk-access-control
  datasource:
    url: jdbc:sqlite:./data/wifi_access.db
    driver-class-name: org.sqlite.JDBC
    username:
    password:
  jpa:
    database-platform: org.hibernate.dialect.SQLiteDialect
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true

# Конфигурация роутера
router:
  host: 192.168.1.1          # IP адрес роутера
  ssh-port: 22
  username: admin
  password: password           # Замените на реальный пароль
  wifi-interface: wlan0        # Интерфейс Wi-Fi на роутере

# Конфигурация proxy сервера
proxy:
  port: 8888
  listen-address: 0.0.0.0
  capture-host: 0.0.0.0       # Адрес для перехвата трафика

# Конфигурация VK API
vk-api:
  access-token: YOUR_VK_GROUP_ACCESS_TOKEN  # Access token группы
  group-id: 123456789                       # ID группы ВКонтакте
  api-version: 5.131
  base-url: https://api.vk.com/method

# Параметры проверки подписки
subscription:
  cache-ttl-minutes: 60       # Кеш статуса подписки (минуты)
  check-on-new-device: true   # Проверять подписку при подключении нового устройства
  device-scan-interval-minutes: 5    # Интервал сканирования устройств (минуты)
  device-scan-initial-delay-minutes: 1  # Начальная задержка сканирования
  cache-refresh-interval-hours: 1    # Интервал обновления кеша (часы)
  cache-refresh-initial-delay-minutes: 30  # Начальная задержка обновления
  notification-message: |
    Привет! Для получения полного доступа в интернет, 
    пожалуйста, подпишись на нашу группу ВКонтакте.
    После подписки перезагрузи браузер.

# Параметры captive portal
captive-portal:
  enabled: true
  portal-url: http://192.168.1.100:8080/portal
  redirect-port: 80

logging:
  level:
    root: INFO
    com.wifi.access: DEBUG
  file:
    name: logs/wifi-access.log
    max-size: 10MB
    max-history: 10

